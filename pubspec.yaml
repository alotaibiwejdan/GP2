name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: 3.15.2
  firebase_auth: 5.7.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  cloud_firestore: ^5.0.2
  image_picker: ^1.0.7
  image_picker_for_web: ^3.0.1 # هذي للويب
  osm_nominatim: ^0.2.0  # بديل مجاني للويب يحول النص لإحداثيات
  geolocator: ^11.0.0    # وهذا أيضاً للموقع الحالي
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0 # للإشعارات المحلية داخل الجهاز 
  google_sign_in: 7.2.0
 
 
  
# Optional
dependency_overrides:
  osm_nominatim: any  # Use cautiously
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true  # المكان الصح لهذا السطر هنا!

  assets:
    - assets/images/
    - assets/MersalImage/
