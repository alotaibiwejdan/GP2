name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # تحديث إصدارات Firebase لضمان التوافق
  firebase_core: ^3.1.1 
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.0.3 # هذا اللي كان مسبب مشكلة في المين
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  image_picker: ^1.0.7
  image_picker_for_web: ^3.0.1
  osm_nominatim: ^0.2.0
  geolocator: ^11.0.0
  flutter_local_notifications: ^17.1.2
  http: ^1.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/MersalImage/
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
